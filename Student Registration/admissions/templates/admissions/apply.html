<!DOCTYPE html>
<html>
    <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Application Form</title>
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6 bg-white p-4 shadow-sm rounded">
                    <h2 class="mb-4 text-primary">Student Application</h2>
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            <div class="text-danger small">{{ field.errors }}</div>
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-success w-100">Submit Application</button>
                    </form>
                    <hr>
                    <a href="{% url 'home' %}" class="text-secondary">← Back to Home</a>
                </div>
            </div>
        </div>
    </body>
</html>
